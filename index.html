<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel Reader</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="titlebar">
    <span id="app-title">Excel Reader</span>
    <button id="open-btn">Open File</button>
  </div>

  <div id="sheet-tabs" class="hidden"></div>

  <div id="content">
    <div id="drop-zone">
      <div id="drop-icon">⊞</div>
      <p>Open or drop an Excel file to get started</p>
      <button id="open-btn-center">Open File</button>
    </div>
    <div id="table-container" class="hidden"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
